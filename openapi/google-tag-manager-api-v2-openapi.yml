components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication for Google Tag Manager API.
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            tagmanager.readonly: View your Google Tag Manager container and its subcomponents.
            tagmanager.edit.containers: >-
              Manage your Google Tag Manager container and its subcomponents,
              excluding versioning and publishing.
            tagmanager.manage.accounts: >-
              View and manage your Google Tag Manager accounts.
            tagmanager.manage.users: >-
              Manage user permissions of your Google Tag Manager account and
              container.
            tagmanager.publish: >-
              Publish your Google Tag Manager container versions.
            tagmanager.edit.containerversions: >-
              Manage your Google Tag Manager container versions.
            tagmanager.delete.containers: >-
              Delete your Google Tag Manager containers.
  parameters:
    pathParam:
      name: path
      in: path
      required: true
      description: >-
        GTM resource's API relative path, e.g. accounts/{accountId}.
      schema:
        type: string
    parentParam:
      name: parent
      in: path
      required: true
      description: >-
        GTM parent resource's API relative path, e.g. accounts/{accountId} for
        listing containers.
      schema:
        type: string
  schemas:
    Account:
      type: object
      description: Represents a Google Tag Manager Account.
      properties:
        path:
          type: string
          description: GTM Account's API relative path.
          readOnly: true
          example: example_value
        accountId:
          type: string
          description: The Account ID uniquely identifies the GTM Account.
          readOnly: true
          example: '500123'
        name:
          type: string
          description: Account display name.
          example: Example Title
        shareData:
          type: boolean
          description: >-
            Whether the account shares data anonymously with Google and others.
            This flag enables benchmarking by sharing your data in an anonymous
            form.
          example: true
        fingerprint:
          type: string
          description: >-
            The fingerprint of the GTM Account as computed at storage time. This
            value is recomputed whenever the account is modified.
          readOnly: true
          example: example_value
        tagManagerUrl:
          type: string
          format: uri
          description: Auto-generated link to the tag manager UI.
          readOnly: true
          example: https://www.example.com
        features:
          $ref: '#/components/schemas/AccountFeatures'
      required:
      - name
    AccountFeatures:
      type: object
      description: Read-only account feature set.
      properties:
        supportUserPermissions:
          type: boolean
          description: Whether this account has user permissions management enabled.
          readOnly: true
          example: true
        supportMultipleContainers:
          type: boolean
          description: Whether this account supports multiple containers.
          readOnly: true
          example: true
    Container:
      type: object
      description: >-
        Represents a Google Tag Manager Container, which is a collection of
        tags, triggers, and variables used on a website or mobile app.
      properties:
        path:
          type: string
          description: GTM Container's API relative path.
          readOnly: true
          example: example_value
        accountId:
          type: string
          description: GTM Account ID.
          readOnly: true
          example: '500123'
        containerId:
          type: string
          description: The Container ID uniquely identifies the GTM Container.
          readOnly: true
          example: '500123'
        name:
          type: string
          description: Container display name.
          example: Example Title
        domainName:
          type: array
          description: >-
            List of domain names associated with the Container. This is used for
            auto-event tracking and link decoration.
          items:
            type: string
          example: []
        publicId:
          type: string
          description: Container Public ID (e.g., GTM-XXXX).
          readOnly: true
          example: '500123'
        tagIds:
          type: array
          description: All Tag IDs that refer to this Container.
          items:
            type: string
          readOnly: true
          example: []
        notes:
          type: string
          description: Container Notes.
          example: example_value
        usageContext:
          type: array
          description: >-
            List of Usage Contexts for the Container. Valid values include web,
            android, ios, and server.
          items:
            type: string
            enum:
            - usageContextUnspecified
            - web
            - android
            - ios
            - androidSdk5
            - iosSdk5
            - amp
            - server
          example: []
        fingerprint:
          type: string
          description: >-
            The fingerprint of the GTM Container as computed at storage time.
            This value is recomputed whenever the container is modified.
          readOnly: true
          example: example_value
        tagManagerUrl:
          type: string
          format: uri
          description: Auto-generated link to the tag manager UI.
          readOnly: true
          example: https://www.example.com
        taggingServerUrls:
          type: array
          description: List of server-side container URLs for the Container.
          items:
            type: string
            format: uri
          example: https://www.example.com
        features:
          $ref: '#/components/schemas/ContainerFeatures'
      required:
      - name
      - usageContext
    ContainerFeatures:
      type: object
      description: Read-only container feature set.
      properties:
        supportUserPermissions:
          type: boolean
          readOnly: true
          example: true
        supportEnvironments:
          type: boolean
          readOnly: true
          example: true
        supportWorkspaces:
          type: boolean
          readOnly: true
          example: true
        supportGtagConfigs:
          type: boolean
          readOnly: true
          example: true
        supportBuiltInVariables:
          type: boolean
          readOnly: true
          example: true
        supportClients:
          type: boolean
          readOnly: true
          example: true
        supportFolders:
          type: boolean
          readOnly: true
          example: true
        supportTags:
          type: boolean
          readOnly: true
          example: true
        supportTemplates:
          type: boolean
          readOnly: true
          example: true
        supportTriggers:
          type: boolean
          readOnly: true
          example: true
        supportVariables:
          type: boolean
          readOnly: true
          example: true
        supportVersions:
          type: boolean
          readOnly: true
          example: true
        supportZones:
          type: boolean
          readOnly: true
          example: true
        supportTransformations:
          type: boolean
          readOnly: true
          example: true
    Workspace:
      type: object
      description: >-
        Represents a Google Tag Manager Workspace. A workspace is an isolated
        editing environment within a container where changes to tags, triggers,
        and variables can be made and tested before being published.
      properties:
        path:
          type: string
          description: GTM Workspace's API relative path.
          readOnly: true
          example: example_value
        accountId:
          type: string
          description: GTM Account ID.
          readOnly: true
          example: '500123'
        containerId:
          type: string
          description: GTM Container ID.
          readOnly: true
          example: '500123'
        workspaceId:
          type: string
          description: The Workspace ID uniquely identifies the GTM Workspace.
          readOnly: true
          example: '500123'
        name:
          type: string
          description: Workspace display name.
          example: Example Title
        description:
          type: string
          description: Workspace description.
          example: A sample description.
        fingerprint:
          type: string
          description: >-
            The fingerprint of the GTM Workspace as computed at storage time.
            This value is recomputed whenever the workspace is modified.
          readOnly: true
          example: example_value
        tagManagerUrl:
          type: string
          format: uri
          description: Auto-generated link to the tag manager UI.
          readOnly: true
          example: https://www.example.com
      required:
      - name
    Parameter:
      type: object
      description: >-
        Represents a Google Tag Manager Parameter. Parameters are key-value
        pairs that configure tags, triggers, and variables.
      properties:
        type:
          type: string
          description: The parameter type.
          enum:
          - typeUnspecified
          - template
          - integer
          - boolean
          - list
          - map
          - triggerReference
          - tagReference
          example: typeUnspecified
        key:
          type: string
          description: >-
            The named key that uniquely identifies a parameter. Required for
            top-level parameters, as well as map values. Ignored for list values.
          example: example_value
        value:
          type: string
          description: >-
            A parameter's value (may contain variable references) as appropriate
            to the specified type.
          example: example_value
        list:
          type: array
          description: >-
            This list parameter's parameters (keys will be ignored). Used when
            type is list.
          items:
            $ref: '#/components/schemas/Parameter'
          example: []
        map:
          type: array
          description: >-
            This map parameter's parameters (must have keys; keys must be
            unique). Used when type is map.
          items:
            $ref: '#/components/schemas/Parameter'
          example: []
        isWeakReference:
          type: boolean
          description: >-
            Whether or not the parameter is a weak reference. Used to determine
            which parameters should be included in exported containers.
          example: true
      required:
      - type
    Condition:
      type: object
      description: >-
        Represents a predicate that is evaluated against a data layer value
        or variable. Used in trigger filter conditions.
      properties:
        type:
          type: string
          description: The type of operator for this condition.
          enum:
          - conditionTypeUnspecified
          - equals
          - contains
          - startsWith
          - endsWith
          - matchRegex
          - greater
          - greaterOrEquals
          - less
          - lessOrEquals
          - cssSelector
          - urlMatches
          example: conditionTypeUnspecified
        parameter:
          type: array
          description: >-
            A list of named parameters (key/value), depending on the condition's
            type. The first parameter is the left-hand operand, the second is
            the right-hand operand.
          items:
            $ref: '#/components/schemas/Parameter'
          example: []
    Tag:
      type: object
      description: >-
        Represents a Google Tag Manager Tag. A tag is a snippet of code that
        executes on a page when certain conditions (triggers) are met.
      properties:
        path:
          type: string
          description: GTM Tag's API relative path.
          readOnly: true
          example: example_value
        accountId:
          type: string
          description: GTM Account ID.
          readOnly: true
          example: '500123'
        containerId:
          type: string
          description: GTM Container ID.
          readOnly: true
          example: '500123'
        workspaceId:
          type: string
          description: GTM Workspace ID.
          readOnly: true
          example: '500123'
        tagId:
          type: string
          description: The Tag ID uniquely identifies the GTM Tag.
          readOnly: true
          example: '500123'
        name:
          type: string
          description: Tag display name.
          example: Example Title
        type:
          type: string
          description: >-
            GTM Tag Type. Common types include ua (Universal Analytics), gaawc
            (Google Analytics GA4 Configuration), gaawe (Google Analytics GA4
            Event), awct (Google Ads Conversion Tracking), sp (Custom Script),
            html (Custom HTML), img (Custom Image), and flc (Floodlight
            Counter).
          example: example_value
        liveOnly:
          type: boolean
          description: >-
            If set to true, this tag will only fire in the live environment
            (not in preview or debug mode).
          example: true
        priority:
          $ref: '#/components/schemas/Parameter'
        notes:
          type: string
          description: >-
            User notes on how to apply this tag in the container.
          example: example_value
        scheduleStartMs:
          type: string
          format: int64
          description: >-
            The start timestamp in milliseconds to schedule a tag. The tag will
            only fire after this time.
          example: example_value
        scheduleEndMs:
          type: string
          format: int64
          description: >-
            The end timestamp in milliseconds to schedule a tag. The tag will
            stop firing after this time.
          example: example_value
        parameter:
          type: array
          description: The tag's parameters, which configure its behavior.
          items:
            $ref: '#/components/schemas/Parameter'
          example: []
        fingerprint:
          type: string
          description: >-
            The fingerprint of the GTM Tag as computed at storage time. This
            value is recomputed whenever the tag is modified.
          readOnly: true
          example: example_value
        firingTriggerId:
          type: array
          description: >-
            Firing trigger IDs. A tag will fire when any of the listed triggers
            are true and all of its blockingTriggerIds (if any specified) are
            false.
          items:
            type: string
          example: '500123'
        blockingTriggerId:
          type: array
          description: >-
            Blocking trigger IDs. If any of the listed triggers evaluates to
            true, the tag will not fire.
          items:
            type: string
          example: '500123'
        setupTag:
          type: array
          description: >-
            The list of setup tags. Currently, only one setup tag is allowed per
            tag.
          items:
            $ref: '#/components/schemas/SetupTag'
          example: []
        teardownTag:
          type: array
          description: >-
            The list of teardown tags. Currently, only one teardown tag is
            allowed per tag.
          items:
            $ref: '#/components/schemas/TeardownTag'
          example: []
        parentFolderId:
          type: string
          description: Parent folder ID.
          example: '500123'
        tagFiringOption:
          type: string
          description: Option to fire this tag.
          enum:
          - tagFiringOptionUnspecified
          - unlimited
          - oncePerEvent
          - oncePerLoad
          example: tagFiringOptionUnspecified
        tagManagerUrl:
          type: string
          format: uri
          description: Auto-generated link to the tag manager UI.
          readOnly: true
          example: https://www.example.com
        paused:
          type: boolean
          description: >-
            Indicates whether the tag is paused, which prevents the tag from
            firing.
          example: true
        monitoringMetadata:
          $ref: '#/components/schemas/Parameter'
        monitoringMetadataTagNameKey:
          type: string
          description: >-
            If non-empty, then the tag display name will be included in the
            monitoring metadata map using the key specified.
          example: example_value
        consentSettings:
          $ref: '#/components/schemas/ConsentSettings'
      required:
      - name
      - type
    SetupTag:
      type: object
      description: >-
        Represents a setup tag relationship. A setup tag fires before the main
        tag.
      properties:
        tagName:
          type: string
          description: The name of the setup tag.
          example: example_value
        stopOnSetupFailure:
          type: boolean
          description: >-
            If true, fire the main tag only if the setup tag fires successfully.
            If false, fire the main tag regardless of setup tag firing status.
          example: true
    TeardownTag:
      type: object
      description: >-
        Represents a teardown tag relationship. A teardown tag fires after the
        main tag.
      properties:
        tagName:
          type: string
          description: The name of the teardown tag.
          example: example_value
        stopTeardownOnFailure:
          type: boolean
          description: >-
            If true, fire the teardown tag if and only if the main tag fires
            successfully. If false, fire the teardown tag regardless of main tag
            firing status.
          example: true
    ConsentSettings:
      type: object
      description: Tag consent settings.
      properties:
        consentStatus:
          type: string
          description: The tag's consent status.
          enum:
          - notSet
          - notNeeded
          - needed
          example: notSet
        consentType:
          $ref: '#/components/schemas/Parameter'
    Trigger:
      type: object
      description: >-
        Represents a Google Tag Manager Trigger. A trigger defines conditions
        under which tags should fire, such as page views, clicks, form
        submissions, or custom events.
      properties:
        path:
          type: string
          description: GTM Trigger's API relative path.
          readOnly: true
          example: example_value
        accountId:
          type: string
          description: GTM Account ID.
          readOnly: true
          example: '500123'
        containerId:
          type: string
          description: GTM Container ID.
          readOnly: true
          example: '500123'
        workspaceId:
          type: string
          description: GTM Workspace ID.
          readOnly: true
          example: '500123'
        triggerId:
          type: string
          description: The Trigger ID uniquely identifies the GTM Trigger.
          readOnly: true
          example: '500123'
        name:
          type: string
          description: Trigger display name.
          example: Example Title
        type:
          type: string
          description: Defines the data layer event that causes this trigger.
          enum:
          - eventTypeUnspecified
          - pageview
          - domReady
          - windowLoaded
          - customEvent
          - triggerGroup
          - init
          - consentInit
          - serverPageview
          - always
          - firebaseAppException
          - firebaseAppUpdate
          - firebaseCampaign
          - firebaseFirstOpen
          - firebaseInAppPurchase
          - firebaseNotificationDismiss
          - firebaseNotificationForeground
          - firebaseNotificationOpen
          - firebaseNotificationReceive
          - firebaseOsUpdate
          - firebaseSessionStart
          - firebaseUserEngagement
          - formSubmission
          - click
          - linkClick
          - jsError
          - historyChange
          - timer
          - ampClick
          - ampTimer
          - ampScroll
          - ampVisibility
          - youTubeVideo
          - scrollDepth
          - elementVisibility
          example: eventTypeUnspecified
        customEventFilter:
          type: array
          description: >-
            Used in the case of custom event, which is fired if and only if all
            Conditions are true.
          items:
            $ref: '#/components/schemas/Condition'
          example: []
        filter:
          type: array
          description: >-
            The trigger will only fire if and only if all Conditions are true.
          items:
            $ref: '#/components/schemas/Condition'
          example: []
        autoEventFilter:
          type: array
          description: >-
            Used in the case of auto event tracking for filtering events.
          items:
            $ref: '#/components/schemas/Condition'
          example: []
        waitForTags:
          $ref: '#/components/schemas/Parameter'
        checkValidation:
          $ref: '#/components/schemas/Parameter'
        waitForTagsTimeout:
          $ref: '#/components/schemas/Parameter'
        uniqueTriggerId:
          $ref: '#/components/schemas/Parameter'
        eventName:
          $ref: '#/components/schemas/Parameter'
        interval:
          $ref: '#/components/schemas/Parameter'
        limit:
          $ref: '#/components/schemas/Parameter'
        fingerprint:
          type: string
          description: >-
            The fingerprint of the GTM Trigger as computed at storage time.
            This value is recomputed whenever the trigger is modified.
          readOnly: true
          example: example_value
        parentFolderId:
          type: string
          description: Parent folder ID.
          example: '500123'
        selector:
          $ref: '#/components/schemas/Parameter'
        intervalSeconds:
          $ref: '#/components/schemas/Parameter'
        maxTimerLengthSeconds:
          $ref: '#/components/schemas/Parameter'
        verticalScrollPercentageList:
          $ref: '#/components/schemas/Parameter'
        horizontalScrollPercentageList:
          $ref: '#/components/schemas/Parameter'
        visibilitySelector:
          $ref: '#/components/schemas/Parameter'
        visiblePercentageMin:
          $ref: '#/components/schemas/Parameter'
        visiblePercentageMax:
          $ref: '#/components/schemas/Parameter'
        continuousTimeMinMilliseconds:
          $ref: '#/components/schemas/Parameter'
        totalTimeMinMilliseconds:
          $ref: '#/components/schemas/Parameter'
        tagManagerUrl:
          type: string
          format: uri
          description: Auto-generated link to the tag manager UI.
          readOnly: true
          example: https://www.example.com
        notes:
          type: string
          description: >-
            User notes on how to apply this trigger in the container.
          example: example_value
        parameter:
          type: array
          description: Additional parameters for the trigger.
          items:
            $ref: '#/components/schemas/Parameter'
          example: []
      required:
      - name
      - type
    Variable:
      type: object
      description: >-
        Represents a Google Tag Manager Variable. A variable provides dynamic
        values that can be used in tags and triggers, such as page URL,
        click text, or custom JavaScript values.
      properties:
        path:
          type: string
          description: GTM Variable's API relative path.
          readOnly: true
          example: example_value
        accountId:
          type: string
          description: GTM Account ID.
          readOnly: true
          example: '500123'
        containerId:
          type: string
          description: GTM Container ID.
          readOnly: true
          example: '500123'
        workspaceId:
          type: string
          description: GTM Workspace ID.
          readOnly: true
          example: '500123'
        variableId:
          type: string
          description: The Variable ID uniquely identifies the GTM Variable.
          readOnly: true
          example: '500123'
        name:
          type: string
          description: Variable display name.
          example: Example Title
        type:
          type: string
          description: >-
            GTM Variable Type. Common types include v (Data Layer Variable),
            j (1st Party Cookie), k (Custom JavaScript), jsm (Custom
            JavaScript Variable), u (URL), c (Constant), and e (DOM Element).
          example: example_value
        notes:
          type: string
          description: >-
            User notes on how to apply this variable in the container.
          example: example_value
        scheduleStartMs:
          type: string
          format: int64
          description: >-
            The start timestamp in milliseconds to schedule a variable.
          example: example_value
        scheduleEndMs:
          type: string
          format: int64
          description: >-
            The end timestamp in milliseconds to schedule a variable.
          example: example_value
        parameter:
          type: array
          description: The variable's parameters, which configure its behavior.
          items:
            $ref: '#/components/schemas/Parameter'
          example: []
        enablingTriggerId:
          type: array
          description: >-
            For mobile containers only. A list of trigger IDs for enabling
            conditional variables. The variable is enabled if one of the
            enabling triggers is true while all of the disabling triggers are
            false.
          items:
            type: string
          example: '500123'
        disablingTriggerId:
          type: array
          description: >-
            For mobile containers only. A list of trigger IDs for disabling
            conditional variables.
          items:
            type: string
          example: '500123'
        fingerprint:
          type: string
          description: >-
            The fingerprint of the GTM Variable as computed at storage time.
            This value is recomputed whenever the variable is modified.
          readOnly: true
          example: example_value
        parentFolderId:
          type: string
          description: Parent folder ID.
          example: '500123'
        tagManagerUrl:
          type: string
          format: uri
          description: Auto-generated link to the tag manager UI.
          readOnly: true
          example: https://www.example.com
        formatValue:
          $ref: '#/components/schemas/FormatValue'
      required:
      - name
      - type
    FormatValue:
      type: object
      description: Option to convert a variable value to another value.
      properties:
        caseConversionType:
          type: string
          description: >-
            The option to convert a string-type variable value to either
            lowercase or uppercase.
          enum:
          - none
          - lowercase
          - uppercase
          example: none
        convertNullToValue:
          $ref: '#/components/schemas/Parameter'
        convertUndefinedToValue:
          $ref: '#/components/schemas/Parameter'
        convertTrueToValue:
          $ref: '#/components/schemas/Parameter'
        convertFalseToValue:
          $ref: '#/components/schemas/Parameter'
    ContainerVersion:
      type: object
      description: >-
        Represents a version of a Google Tag Manager Container. A container
        version is a snapshot of all tags, triggers, variables, and
        configuration at a point in time.
      properties:
        path:
          type: string
          description: GTM ContainerVersion's API relative path.
          readOnly: true
          example: example_value
        accountId:
          type: string
          description: GTM Account ID.
          readOnly: true
          example: '500123'
        containerId:
          type: string
          description: GTM Container ID.
          readOnly: true
          example: '500123'
        containerVersionId:
          type: string
          description: The Container Version ID uniquely identifies the GTM Container Version.
          readOnly: true
          example: '500123'
        name:
          type: string
          description: Container version display name.
          example: Example Title
        description:
          type: string
          description: Container version description.
          example: A sample description.
        container:
          $ref: '#/components/schemas/Container'
        tag:
          type: array
          description: The tags in the container that this version was taken from.
          items:
            $ref: '#/components/schemas/Tag'
          example: []
        trigger:
          type: array
          description: The triggers in the container that this version was taken from.
          items:
            $ref: '#/components/schemas/Trigger'
          example: []
        variable:
          type: array
          description: The variables in the container that this version was taken from.
          items:
            $ref: '#/components/schemas/Variable'
          example: []
        fingerprint:
          type: string
          description: >-
            The fingerprint of the GTM Container Version as computed at storage
            time.
          readOnly: true
          example: example_value
        tagManagerUrl:
          type: string
          format: uri
          description: Auto-generated link to the tag manager UI.
          readOnly: true
          example: https://www.example.com
        deleted:
          type: boolean
          description: A value of true indicates this version has been deleted.
          readOnly: true
          example: true
